<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Love Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Inter', cursive, sans-serif;
            background: linear-gradient(45deg, #ff0095, #8b5cf6, #ff6b6b, #4ecdc4);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 500;
            background: linear-gradient(45deg, #ff6b6b, #ff0095);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            animation: glow 2s infinite alternate;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
            }
            to {
                box-shadow: 0 0 30px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 0, 149, 0.6);
            }
        }

        .heart {
            font-size: 4rem;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 1rem;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1.2); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .message {
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .message h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .message p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            animation: fadeIn 1s ease-out 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.3);
            animation: float 6s infinite linear;
        }

        .floating-heart:nth-child(1) { left: 10%; animation-delay: 0s; }
        .floating-heart:nth-child(2) { left: 20%; animation-delay: 1s; }
        .floating-heart:nth-child(3) { left: 30%; animation-delay: 2s; }
        .floating-heart:nth-child(4) { left: 40%; animation-delay: 3s; }
        .floating-heart:nth-child(5) { left: 50%; animation-delay: 4s; }
        .floating-heart:nth-child(6) { left: 60%; animation-delay: 5s; }
        .floating-heart:nth-child(7) { left: 70%; animation-delay: 6s; }
        .floating-heart:nth-child(8) { left: 80%; animation-delay: 7s; }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .message h1 {
                font-size: 2.5rem;
            }

            .message p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="floating-hearts">
        <div class="floating-heart">❤️</div>
        <div class="floating-heart">💖</div>
        <div class="floating-heart">💕</div>
        <div class="floating-heart">💗</div>
        <div class="floating-heart">💓</div>
        <div class="floating-heart">💘</div>
        <div class="floating-heart">💝</div>
        <div class="floating-heart">💞</div>
    </div>

    <div class="container" id="main">
        <h1>Click For Something Special ✨</h1>
        <button onclick="showLove()">Open 💌</button>
    </div>

    <!-- Audio removed as the file doesn't exist - can be added back with a proper audio file -->
    <!-- <audio id="bgmusic" loop>
        <source src="your-audio-file.mp3" type="audio/mpeg">
    </audio> -->

    <script>
        function showLove() {
            // Play music after user click (commented out since audio file doesn't exist)
            // var music = document.getElementById("bgmusic");
            // music.play();

            // Change ONLY the container, not the whole body
            document.getElementById("main").innerHTML = `
                <div class="message">
                    <div class="heart">❤️</div>
                    <h1>You Are Truly Special 💖</h1>
                    <p>
                        I think you're amazing.<br>
                        Your smile brightens my day.<br>
                        Talking to you makes everything better.<br><br>
                        This moment is just for you 🎵❤️
                    </p>
                    <p style="font-size: 1rem; margin-top: 2rem; opacity: 0.8;">
                        Made with love by Xeno 💕
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>
